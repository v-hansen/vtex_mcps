# VTEX MCP Servers - Docker Compose for Local Development
#
# Before running, create a .env file with your VTEX credentials:
#   cp .env.example .env
#   # Edit .env with your actual credentials
#
# Start all servers:   docker compose up
# Start one server:    docker compose up catalog-api
# Rebuild all:         docker compose up --build

services:
  catalog-api:
    build: ./servers/catalog-api
    command: ["--transport", "http", "--port", "3000"]
    ports:
      - "3001:3000"
    env_file: .env

